<html>

<body style="width:500px">
  <link rel="stylesheet" href="lib/bootstrap.min.css">
  <link rel="stylesheet" href="lib/jquery-ui.css">


  <div class="accordion" id="accordionExample">
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne"
          aria-expanded="true" aria-controls="collapseOne">
          Log new time record
        </button>
      </h2>
      <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
        <div class="accordion-body">




          <b>Start time:</b>
          <select id="startTime" class="form-select" aria-label="">
            <option value="">Select time</option>
            <option value="1">1 a.m.</option>
            <option value="2">2 a.m.</option>
            <option value="3">3 a.m.</option>
            <option value="4">4 a.m.</option>
            <option value="5">5 a.m.</option>
            <option value="6">6 a.m.</option>
            <option value="7">7 a.m.</option>
            <option value="8">8 a.m.</option>
            <option value="9">9 a.m.</option>
            <option value="10">10 a.m.</option>
            <option value="11">11 a.m.</option>
            <option value="12">12 p.m.</option>

            <option value="13">1 p.m.</option>
            <option value="14">2 p.m.</option>
            <option value="15">3 p.m.</option>
            <option value="16">4 p.m.</option>
            <option value="17">5 p.m.</option>
            <option value="18">6 p.m.</option>
            <option value="19">7 p.m.</option>
            <option value="20">8 p.m.</option>
            <option value="21">9 p.m.</option>
            <option value="22">10 p.m.</option>
            <option value="23">11 p.m.</option>
          </select>

          <b>End time:</b>
          <select id="endTime" class="form-select" aria-label="">
            <option value="">Select time</option>
            <option value="1">1 a.m.</option>
            <option value="2">2 a.m.</option>
            <option value="3">3 a.m.</option>
            <option value="4">4 a.m.</option>
            <option value="5">5 a.m.</option>
            <option value="6">6 a.m.</option>
            <option value="7">7 a.m.</option>
            <option value="8">8 a.m.</option>
            <option value="9">9 a.m.</option>
            <option value="10">10 a.m.</option>
            <option value="11">11 a.m.</option>
            <option value="12">12 p.m.</option>

            <option value="13">1 p.m.</option>
            <option value="14">2 p.m.</option>
            <option value="15">3 p.m.</option>
            <option value="16">4 p.m.</option>
            <option value="17">5 p.m.</option>
            <option value="18">6 p.m.</option>
            <option value="19">7 p.m.</option>
            <option value="20">8 p.m.</option>
            <option value="21">9 p.m.</option>
            <option value="22">10 p.m.</option>
            <option value="23">11 p.m.</option>
          </select>

          <b>Date (dd-mm-yyyy):</b>
          <input type="text" class="form-control" id="dateLogged" placeholder="">


          <b>Work type</b>
          <select id="workType" class="form-select" aria-label="">
            <option value="">Select type</option>
            <option value="normal">Normal hours</option>
            <option value="overtime">Overtime</option>
          </select>

          <div id="space" style="height:20px"></div>
          <button id="saveRecord" type="button" class="btn btn-primary">Save record</button>


        </div>
      </div>
    </div>
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo"
          aria-expanded="false" aria-controls="collapseTwo">
          View chart
        </button>
      </h2>
      <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
        <div class="accordion-body">

          Chart start date:
          <input type="text" class="form-control" id="chartStart" placeholder="">
          Chart end date:
          <input type="text" class="form-control" id="chartEnd" placeholder="">


          <div style="height:20px"></div>

          <button type="button" id="genChartDayRange" class="btn btn-primary">Total hours by day range</button>


          <div style="height:20px"></div>
          <button type="button" id="genChartMonth" class="btn btn-primary">Total hours by Month</button>


        </div>
      </div>
    </div>

  </div>

  <script src="lib/jquery.js"></script>
  <script src="lib/jquery-ui.js"></script>
  <script src="lib/bootstrap.bundle.min.js"></script>
  <script src="popup.js"></script>

</body>
</html>
